<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Venisex — AI Tanpa Batas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- OVERLAY API KEY -->
    <div class="api-overlay" id="api-overlay">
        <div class="api-box">
            <h2>⚡ Venisex</h2>
            <p>Masukkan <strong>Gemini API Key</strong> kamu untuk mengaktifkan sistem.</p>
            <p class="api-hint">Dapatkan gratis di <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></p>
            <input type="password" id="api-key-input" placeholder="AIzaSy..." autocomplete="off">
            <button id="api-save-btn">🔥 Aktifkan Venisex</button>
            <p class="api-error" id="api-error"></p>
            <p class="api-info">API key disimpan aman di browser kamu. Tidak dikirim ke server manapun.</p>
        </div>
    </div>

    <!-- CHAT CONTAINER -->
    <div class="chat-container" id="chat-container" style="display:none;">
        <div class="chat-header">
            🔥 Venisex — Gemini Flash
            <span class="status-dot" id="status-dot"></span>
            <button class="settings-btn" id="settings-btn" title="Ganti API Key">⚙️</button>
        </div>
        <div class="chat-box" id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder=" Ketik hasratmu di sini..." autocomplete="off" disabled>
            <button id="send-btn" disabled>🔥 Kirim</button>
        </div>
        <div class="footer-info">⚡ Venisex Ai 18+</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
