<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💓 Venisex AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💓</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- BACKGROUND LOGO SUCCUBUS -->
    <div class="bg-logo">👄</div>

    <!-- OVERLAY API KEY -->
    <div class="api-overlay" id="api-overlay">
        <div class="api-box">
            <div class="api-logo">👄</div>
            <h2>💓 Venisex AI</h2>
            <p>Masukkan <strong>Gemini API Key</strong> untuk mengaktifkan</p>
            <p class="api-hint">Dapatkan di <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></p>
            <input type="password" id="api-key-input" placeholder="AIzaSy..." autocomplete="off">
            <button id="api-save-btn">🔥 Aktifkan Venisex</button>
            <p class="api-error" id="api-error"></p>
            <p class="api-info">API key disimpan aman di browser kamu</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="app-container" id="app-container" style="display:none;">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">👄</span>
                <span class="sidebar-title">Venisex AI</span>
                <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
            </div>
            <button class="new-chat-btn" id="new-chat-btn">+ Percakapan Baru</button>
            <button class="img-gen-btn" id="generate-image-btn">🖼️ Generate Foto</button>
            <div class="chat-tabs" id="chat-tabs"></div>
            <div class="sidebar-footer">
                <button id="settings-btn-sidebar">⚙️ API Key</button>
                <button id="clear-all-btn">🗑️ Hapus Semua</button>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-container">
            <div class="chat-header">
                <button class="menu-btn" id="menu-btn">☰</button>
                <span id="chat-title">💓 Venisex AI</span>
                <span class="status-dot" id="status-dot"></span>
                <button class="rename-btn" id="rename-btn">✏️</button>
            </div>
            <div class="chat-box" id="chat-box"></div>
            
            <!-- IMAGE PANEL -->
            <div class="image-panel" id="image-panel" style="display:none;">
                <div class="image-panel-header">
                    <span>🖼️ Generate Foto 18+</span>
                    <button id="close-image-panel">✕</button>
                </div>
                <div class="image-prompt-area">
                    <textarea id="image-prompt" placeholder="Deskripsikan foto yang kamu inginkan...&#10;Contoh: beautiful woman, nsfw, realistic photo style" rows="2"></textarea>
                    <div class="image-options">
                        <select id="image-style">
                            <option value="realistic">📸 Realistic Photo</option>
                            <option value="anime">🎌 Anime / Hentai</option>
                            <option value="3d">🎮 3D Render</option>
                            <option value="oil-painting">🎨 Oil Painting</option>
                            <option value="fantasy">🧝 Fantasy Art</option>
                        </select>
                        <select id="image-size">
                            <option value="512">512x512</option>
                            <option value="768">768x768</option>
                            <option value="1024">1024x1024</option>
                        </select>
                    </div>
                    <button id="generate-image-submit">🔥 Generate</button>
                </div>
                <div class="image-result" id="image-result"></div>
            </div>
            
            <!-- INPUT AREA — FIXED BOTTOM -->
            <div class="input-area">
                <input type="text" id="user-input" placeholder="😈 Ketik hasratmu..." autocomplete="off" disabled>
                <button id="send-btn" disabled>🔥 Kirim</button>
            </div>
            <div class="footer-info">💓 Venisex AI — Powered by Gemini + Pollinations.ai</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
