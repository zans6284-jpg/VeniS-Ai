<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 💓Venisex💓</title>
    <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <!-- OVERLAY LOGIN -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h2>⚡ Venisex💓</h2>
            <p>Login dengan Google</p>
            <button id="google-login-btn">
                <img src="https://www.google.com/favicon.ico" alt="G" width="20" height="20"> Login dengan Google
            </button>
            <p class="login-info" id="login-status">Percakapanmu akan tersimpan aman di cloud</p>
        </div>
    </div>

    <!-- OVERLAY API KEY -->
    <div class="api-overlay" id="api-overlay" style="display:none;">
        <div class="api-box">
            <h2>⚡ API Key</h2>
            <p>Masukkan <strong>Gemini API Key</strong></p>
            <p class="api-hint">Dapatkan di <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></p>
            <input type="password" id="api-key-input" placeholder="AIzaSy..." autocomplete="off">
            <button id="api-save-btn">🔥 Aktifkan</button>
            <p class="api-error" id="api-error"></p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="app-container" id="app-container" style="display:none;">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img id="user-avatar" class="user-avatar" src="https://www.google.com/favicon.ico" alt="Avatar">
                <span id="user-name">User</span>
                <button id="logout-btn" title="Logout">🚪</button>
            </div>
            <button class="new-chat-btn" id="new-chat-btn">+ Percakapan Baru</button>
            <div class="chat-tabs" id="chat-tabs"></div>
            <div class="sidebar-footer">
                <button id="settings-btn-sidebar" title="Ganti API Key">⚙️ API Key</button>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-container">
            <div class="chat-header">
                <span id="chat-title">🔥 Quantum Omega</span>
                <span class="status-dot" id="status-dot"></span>
                <button class="rename-btn" id="rename-btn" title="Rename">✏️</button>
            </div>
            <div class="chat-box" id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder=" Sampaikan hasratmu..." autocomplete="off" disabled>
                <button id="send-btn" disabled>🔥 Kirim</button>
            </div>
            <div class="footer-info">⚡ Venisex💓 Ai-obrolan18+</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
